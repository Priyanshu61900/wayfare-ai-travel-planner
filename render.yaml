services:
  - type: web
    name: wayfare-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build -w @wayfare/api
    startCommand: npm run start -w @wayfare/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: WEB_ORIGIN
        sync: false

