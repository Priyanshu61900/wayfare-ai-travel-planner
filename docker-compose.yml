services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: mongodb://mongo:27017/wayfare
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      WEB_ORIGIN: http://localhost:3000
    depends_on:
      - mongo
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_URL: http://api:4000
    restart: unless-stopped
    environment:
      API_URL: http://api:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  mongo_data:

